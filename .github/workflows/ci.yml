name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bc
          POSTGRES_PASSWORD: bc
          POSTGRES_DB: bc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Apply Prisma migrations
        env:
          DATABASE_URL: postgresql://bc:bc@127.0.0.1:5432/bc_test?schema=public
        run: pnpm --filter @bc/server exec prisma migrate deploy
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://bc:bc@127.0.0.1:5432/bc_test?schema=public
        run: pnpm --filter @bc/server exec prisma generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        env:
          TEST_DATABASE_URL: postgresql://bc:bc@127.0.0.1:5432/bc_test?schema=public
        run: pnpm test
